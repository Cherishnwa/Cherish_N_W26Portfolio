<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a0d"/>
      <stop offset="100%" style="stop-color:#00120a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#00cc66" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="84" x2="800" y2="84"/><line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="252" x2="800" y2="252"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>

  <!-- Glow bg -->
  <circle cx="400" cy="210" r="200" fill="url(#glow1)"/>

  <!-- ── Neural network diagram ── -->
  <!-- Layer labels -->
  <text x="120" y="38" font-family="monospace" font-size="8" fill="#00cc66" opacity="0.5" text-anchor="middle">INPUT</text>
  <text x="120" y="48" font-family="monospace" font-size="7" fill="#00cc66" opacity="0.35" text-anchor="middle">4 features</text>
  <text x="300" y="38" font-family="monospace" font-size="8" fill="#00ff88" opacity="0.5" text-anchor="middle">HIDDEN 1</text>
  <text x="300" y="48" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.35" text-anchor="middle">100 · relu</text>
  <text x="480" y="38" font-family="monospace" font-size="8" fill="#00ff88" opacity="0.5" text-anchor="middle">HIDDEN 2</text>
  <text x="480" y="48" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.35" text-anchor="middle">100 · relu</text>
  <text x="660" y="38" font-family="monospace" font-size="8" fill="#3ddc84" opacity="0.5" text-anchor="middle">OUTPUT</text>
  <text x="660" y="48" font-family="monospace" font-size="7" fill="#3ddc84" opacity="0.35" text-anchor="middle">3 · softmax</text>

  <!-- Input layer — 4 nodes -->
  <g opacity="0.9">
    <circle cx="120" cy="110" r="14" fill="#001a0d" stroke="#00cc66" stroke-width="1.5"/>
    <circle cx="120" cy="160" r="14" fill="#001a0d" stroke="#00cc66" stroke-width="1.5"/>
    <circle cx="120" cy="210" r="14" fill="#001a0d" stroke="#00cc66" stroke-width="1.5"/>
    <circle cx="120" cy="260" r="14" fill="#001a0d" stroke="#00cc66" stroke-width="1.5"/>
    <text x="120" y="114" font-family="monospace" font-size="7" fill="#00cc66" text-anchor="middle">x₁</text>
    <text x="120" y="164" font-family="monospace" font-size="7" fill="#00cc66" text-anchor="middle">x₂</text>
    <text x="120" y="214" font-family="monospace" font-size="7" fill="#00cc66" text-anchor="middle">x₃</text>
    <text x="120" y="264" font-family="monospace" font-size="7" fill="#00cc66" text-anchor="middle">x₄</text>
  </g>

  <!-- Connections input→hidden1 (sampled subset) -->
  <g stroke="#00cc66" stroke-width="0.4" opacity="0.12">
    <line x1="134" y1="110" x2="286" y2="100"/>
    <line x1="134" y1="110" x2="286" y2="145"/>
    <line x1="134" y1="110" x2="286" y2="190"/>
    <line x1="134" y1="110" x2="286" y2="235"/>
    <line x1="134" y1="160" x2="286" y2="100"/>
    <line x1="134" y1="160" x2="286" y2="145"/>
    <line x1="134" y1="160" x2="286" y2="190"/>
    <line x1="134" y1="160" x2="286" y2="235"/>
    <line x1="134" y1="210" x2="286" y2="100"/>
    <line x1="134" y1="210" x2="286" y2="145"/>
    <line x1="134" y1="210" x2="286" y2="190"/>
    <line x1="134" y1="210" x2="286" y2="235"/>
    <line x1="134" y1="260" x2="286" y2="100"/>
    <line x1="134" y1="260" x2="286" y2="145"/>
    <line x1="134" y1="260" x2="286" y2="190"/>
    <line x1="134" y1="260" x2="286" y2="235"/>
  </g>

  <!-- Hidden layer 1 — 5 visible nodes (representing 100) -->
  <g opacity="0.9">
    <circle cx="300" cy="100" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="300" cy="145" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="300" cy="190" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="300" cy="235" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="300" cy="280" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <!-- dots indicating more nodes -->
    <circle cx="300" cy="316" r="3" fill="#00ff88" opacity="0.4"/>
    <circle cx="300" cy="328" r="3" fill="#00ff88" opacity="0.3"/>
    <circle cx="300" cy="340" r="3" fill="#00ff88" opacity="0.2"/>
  </g>

  <!-- Connections hidden1→hidden2 -->
  <g stroke="#00ff88" stroke-width="0.4" opacity="0.1">
    <line x1="312" y1="100" x2="468" y2="100"/>
    <line x1="312" y1="100" x2="468" y2="145"/>
    <line x1="312" y1="100" x2="468" y2="190"/>
    <line x1="312" y1="145" x2="468" y2="100"/>
    <line x1="312" y1="145" x2="468" y2="145"/>
    <line x1="312" y1="145" x2="468" y2="235"/>
    <line x1="312" y1="190" x2="468" y2="145"/>
    <line x1="312" y1="190" x2="468" y2="190"/>
    <line x1="312" y1="190" x2="468" y2="235"/>
    <line x1="312" y1="235" x2="468" y2="100"/>
    <line x1="312" y1="235" x2="468" y2="190"/>
    <line x1="312" y1="235" x2="468" y2="280"/>
    <line x1="312" y1="280" x2="468" y2="145"/>
    <line x1="312" y1="280" x2="468" y2="235"/>
    <line x1="312" y1="280" x2="468" y2="280"/>
  </g>

  <!-- Hidden layer 2 -->
  <g opacity="0.9">
    <circle cx="480" cy="100" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="480" cy="145" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="480" cy="190" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="480" cy="235" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="480" cy="280" r="12" fill="#00220f" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="480" cy="316" r="3" fill="#00ff88" opacity="0.4"/>
    <circle cx="480" cy="328" r="3" fill="#00ff88" opacity="0.3"/>
    <circle cx="480" cy="340" r="3" fill="#00ff88" opacity="0.2"/>
  </g>

  <!-- Connections hidden2→output -->
  <g stroke="#3ddc84" stroke-width="0.6" opacity="0.2">
    <line x1="492" y1="100" x2="646" y2="160"/>
    <line x1="492" y1="145" x2="646" y2="160"/>
    <line x1="492" y1="190" x2="646" y2="210"/>
    <line x1="492" y1="235" x2="646" y2="210"/>
    <line x1="492" y1="280" x2="646" y2="260"/>
    <line x1="492" y1="100" x2="646" y2="210"/>
    <line x1="492" y1="145" x2="646" y2="260"/>
    <line x1="492" y1="190" x2="646" y2="160"/>
    <line x1="492" y1="235" x2="646" y2="260"/>
    <line x1="492" y1="280" x2="646" y2="160"/>
  </g>

  <!-- Output layer — 3 classes -->
  <g opacity="0.95">
    <!-- setosa -->
    <circle cx="660" cy="160" r="16" fill="#00400f" stroke="#3ddc84" stroke-width="2"/>
    <text x="660" y="164" font-family="monospace" font-size="7" fill="#3ddc84" text-anchor="middle">🌸</text>
    <!-- versicolor -->
    <circle cx="660" cy="210" r="16" fill="#00400f" stroke="#3ddc84" stroke-width="2"/>
    <text x="660" y="214" font-family="monospace" font-size="7" fill="#3ddc84" text-anchor="middle">🌺</text>
    <!-- virginica -->
    <circle cx="660" cy="260" r="16" fill="#00400f" stroke="#3ddc84" stroke-width="2"/>
    <text x="660" y="264" font-family="monospace" font-size="7" fill="#3ddc84" text-anchor="middle">🌻</text>
  </g>

  <!-- Class labels -->
  <text x="700" y="163" font-family="monospace" font-size="8" fill="#3ddc84" opacity="0.7">setosa</text>
  <text x="700" y="213" font-family="monospace" font-size="8" fill="#3ddc84" opacity="0.7">versicolor</text>
  <text x="700" y="263" font-family="monospace" font-size="8" fill="#3ddc84" opacity="0.7">virginica</text>

  <!-- Accuracy badge -->
  <rect x="290" y="360" width="220" height="42" rx="8" fill="#00400f" opacity="0.6" stroke="#3ddc84" stroke-width="1" opacity-stroke="0.5"/>
  <rect x="290" y="360" width="220" height="42" rx="8" fill="none" stroke="#3ddc84" stroke-width="1" opacity="0.45"/>
  <text x="400" y="378" font-family="monospace" font-size="9" fill="#3ddc84" opacity="0.9" text-anchor="middle">Model 1 — 100 units · 20 epochs</text>
  <text x="400" y="393" font-family="monospace" font-size="9" fill="#00ff88" opacity="0.7" text-anchor="middle">Accuracy ~97% on test set</text>

  <!-- Bottom label -->
  <text x="400" y="415" font-family="monospace" font-size="9" fill="#00cc66" opacity="0.4" text-anchor="middle">python · tensorflow · keras · neural networks · iris dataset · multiclass classification</text>
</svg>
