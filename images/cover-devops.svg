<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a1a"/>
      <stop offset="100%" style="stop-color:#001f20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#00b4b4" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="84" x2="800" y2="84"/><line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="252" x2="800" y2="252"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- CI/CD pipeline - boxes connected with arrows -->
  <!-- Stage boxes -->
  <rect x="60" y="175" width="100" height="60" rx="6" fill="none" stroke="#00b4b4" stroke-width="1.5" opacity="0.6"/>
  <text x="110" y="200" font-family="monospace" font-size="9" fill="#00b4b4" opacity="0.7" text-anchor="middle">SOURCE</text>
  <text x="110" y="214" font-family="monospace" font-size="8" fill="#00b4b4" opacity="0.5" text-anchor="middle">git push</text>

  <rect x="215" y="175" width="100" height="60" rx="6" fill="none" stroke="#00c8a0" stroke-width="1.5" opacity="0.6"/>
  <text x="265" y="200" font-family="monospace" font-size="9" fill="#00c8a0" opacity="0.7" text-anchor="middle">BUILD</text>
  <text x="265" y="214" font-family="monospace" font-size="8" fill="#00c8a0" opacity="0.5" text-anchor="middle">compile</text>

  <rect x="370" y="175" width="100" height="60" rx="6" fill="none" stroke="#00b4b4" stroke-width="1.5" opacity="0.6"/>
  <text x="420" y="200" font-family="monospace" font-size="9" fill="#00b4b4" opacity="0.7" text-anchor="middle">TEST</text>
  <text x="420" y="214" font-family="monospace" font-size="8" fill="#00b4b4" opacity="0.5" text-anchor="middle">validate</text>

  <rect x="525" y="175" width="100" height="60" rx="6" fill="none" stroke="#00c8a0" stroke-width="1.5" opacity="0.6"/>
  <text x="575" y="200" font-family="monospace" font-size="9" fill="#00c8a0" opacity="0.7" text-anchor="middle">DEPLOY</text>
  <text x="575" y="214" font-family="monospace" font-size="8" fill="#00c8a0" opacity="0.5" text-anchor="middle">release</text>

  <rect x="680" y="175" width="70" height="60" rx="6" fill="#00b4b4" opacity="0.1" stroke="#00b4b4" stroke-width="1.5" opacity-stroke="0.6"/>
  <rect x="680" y="175" width="70" height="60" rx="6" fill="none" stroke="#00b4b4" stroke-width="1.5" opacity="0.6"/>
  <text x="715" y="200" font-family="monospace" font-size="9" fill="#00b4b4" opacity="0.7" text-anchor="middle">LIVE</text>
  <text x="715" y="214" font-family="monospace" font-size="8" fill="#5fffdd" opacity="0.6" text-anchor="middle">✓ prod</text>

  <!-- Arrows between stages -->
  <line x1="160" y1="205" x2="215" y2="205" stroke="#00b4b4" stroke-width="1.5" opacity="0.5"/>
  <polygon points="213,200 223,205 213,210" fill="#00b4b4" opacity="0.5"/>
  <line x1="315" y1="205" x2="370" y2="205" stroke="#00c8a0" stroke-width="1.5" opacity="0.5"/>
  <polygon points="368,200 378,205 368,210" fill="#00c8a0" opacity="0.5"/>
  <line x1="470" y1="205" x2="525" y2="205" stroke="#00b4b4" stroke-width="1.5" opacity="0.5"/>
  <polygon points="523,200 533,205 523,210" fill="#00b4b4" opacity="0.5"/>
  <line x1="625" y1="205" x2="680" y2="205" stroke="#00c8a0" stroke-width="1.5" opacity="0.5"/>
  <polygon points="678,200 688,205 678,210" fill="#00c8a0" opacity="0.5"/>

  <!-- Docker cube shapes -->
  <polygon points="140,80 180,60 220,80 220,120 180,140 140,120" fill="none" stroke="#00b4b4" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="80" x2="180" y2="100" stroke="#00b4b4" stroke-width="0.7" opacity="0.25"/>
  <line x1="220" y1="80" x2="180" y2="100" stroke="#00b4b4" stroke-width="0.7" opacity="0.25"/>
  <line x1="180" y1="100" x2="180" y2="140" stroke="#00b4b4" stroke-width="0.7" opacity="0.25"/>

  <polygon points="560,290 590,275 620,290 620,320 590,335 560,320" fill="none" stroke="#00c8a0" stroke-width="1" opacity="0.3"/>
  <line x1="560" y1="290" x2="590" y2="305" stroke="#00c8a0" stroke-width="0.7" opacity="0.25"/>
  <line x1="620" y1="290" x2="590" y2="305" stroke="#00c8a0" stroke-width="0.7" opacity="0.25"/>
  <line x1="590" y1="305" x2="590" y2="335" stroke="#00c8a0" stroke-width="0.7" opacity="0.25"/>

  <!-- Feedback loop arc -->
  <path d="M 715 235 Q 715 350 400 370 Q 85 350 110 235" fill="none" stroke="#00b4b4" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>

  <!-- Label -->
  <text x="400" y="405" font-family="monospace" font-size="10" fill="#00b4b4" opacity="0.45" text-anchor="middle">git · docker · ci/cd · devops · automation</text>
</svg>
