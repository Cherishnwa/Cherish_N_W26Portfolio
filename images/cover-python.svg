<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3572A5;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3d261;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8b84b;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#3572A5" stroke-width="0.4" opacity="0.2">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- Large circle -->
  <circle cx="600" cy="210" r="180" fill="url(#g1)" opacity="0.15"/>
  <!-- Python snake shapes - abstract hexagons -->
  <polygon points="400,60 460,95 460,165 400,200 340,165 340,95" fill="url(#g1)" opacity="0.6"/>
  <polygon points="400,100 445,125 445,175 400,200 355,175 355,125" fill="none" stroke="#4a90d9" stroke-width="1.5" opacity="0.8"/>
  <!-- Small accent shapes -->
  <polygon points="620,80 650,97 650,131 620,148 590,131 590,97" fill="none" stroke="#f3d261" stroke-width="1.2" opacity="0.5"/>
  <polygon points="150,280 175,295 175,325 150,340 125,325 125,295" fill="#3572A5" opacity="0.4"/>
  <!-- Dots -->
  <circle cx="220" cy="120" r="4" fill="#4a90d9" opacity="0.7"/>
  <circle cx="680" cy="320" r="6" fill="#f3d261" opacity="0.6"/>
  <circle cx="100" cy="180" r="3" fill="#4a90d9" opacity="0.5"/>
  <circle cx="720" cy="140" r="5" fill="#4a90d9" opacity="0.4"/>
  <!-- Connecting lines -->
  <line x1="400" y1="200" x2="620" y2="80" stroke="#4a90d9" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="60" x2="150" y2="280" stroke="#f3d261" stroke-width="0.8" opacity="0.2"/>
  <!-- Label -->
  <text x="400" y="310" font-family="monospace" font-size="11" fill="#4a90d9" opacity="0.6" text-anchor="middle">python · jupyter notebook · data analysis</text>
  <!-- Large faint text -->
  <text x="400" y="390" font-family="monospace" font-size="60" fill="#3572A5" opacity="0.07" text-anchor="middle" font-weight="bold">PYTHON</text>
</svg>
