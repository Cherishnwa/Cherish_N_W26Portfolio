<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0010"/>
      <stop offset="100%" style="stop-color:#1f0015"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#C2185B" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="84" x2="800" y2="84"/><line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="252" x2="800" y2="252"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- Branch diagram -->
  <!-- Main branch line -->
  <line x1="120" y1="210" x2="680" y2="210" stroke="#C2185B" stroke-width="2" opacity="0.6"/>
  <!-- Feature branch -->
  <path d="M 280 210 Q 280 130 400 130 Q 520 130 520 210" fill="none" stroke="#E91E8C" stroke-width="1.5" opacity="0.5"/>
  <!-- Hotfix branch -->
  <path d="M 200 210 Q 200 300 300 300 Q 400 300 400 270" fill="none" stroke="#F06292" stroke-width="1.2" opacity="0.4"/>
  <!-- Commit dots on main -->
  <circle cx="160" cy="210" r="8" fill="#C2185B" opacity="0.9"/>
  <circle cx="280" cy="210" r="8" fill="#C2185B" opacity="0.9"/>
  <circle cx="400" cy="210" r="8" fill="#E91E8C" opacity="0.9"/>
  <circle cx="520" cy="210" r="8" fill="#C2185B" opacity="0.9"/>
  <circle cx="640" cy="210" r="8" fill="#C2185B" opacity="0.9"/>
  <!-- Commits on feature branch -->
  <circle cx="340" cy="130" r="6" fill="#E91E8C" opacity="0.8"/>
  <circle cx="460" cy="130" r="6" fill="#E91E8C" opacity="0.8"/>
  <!-- Commits on hotfix -->
  <circle cx="280" cy="285" r="5" fill="#F06292" opacity="0.7"/>
  <circle cx="370" cy="270" r="5" fill="#F06292" opacity="0.7"/>
  <!-- Branch labels -->
  <text x="400" y="118" font-family="monospace" font-size="9" fill="#E91E8C" opacity="0.6" text-anchor="middle">feature branch</text>
  <text x="300" y="320" font-family="monospace" font-size="9" fill="#F06292" opacity="0.5" text-anchor="middle">hotfix</text>
  <text x="400" y="240" font-family="monospace" font-size="9" fill="#C2185B" opacity="0.5" text-anchor="middle">main</text>
  <!-- PR merge badge -->
  <rect x="550" y="60" width="110" height="40" rx="20" fill="#C2185B" opacity="0.15"/>
  <rect x="550" y="60" width="110" height="40" rx="20" fill="none" stroke="#C2185B" stroke-width="1.2" opacity="0.45"/>
  <text x="605" y="75" font-family="monospace" font-size="9" fill="#E91E8C" opacity="0.7" text-anchor="middle">pull request</text>
  <text x="605" y="89" font-family="monospace" font-size="9" fill="#F48FB1" opacity="0.6" text-anchor="middle">🦈 merged</text>
  <!-- Floating elements -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#C2185B" stroke-width="1" opacity="0.25"/>
  <circle cx="720" cy="320" r="15" fill="none" stroke="#E91E8C" stroke-width="1" opacity="0.25"/>
  <!-- Label -->
  <text x="400" y="400" font-family="monospace" font-size="10" fill="#C2185B" opacity="0.5" text-anchor="middle">open source · git · collaboration · pull shark 🦈</text>
</svg>
