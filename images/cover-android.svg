<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0014"/>
      <stop offset="100%" style="stop-color:#130019"/>
    </linearGradient>
    <linearGradient id="kt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A97BFF"/>
      <stop offset="100%" style="stop-color:#7c5cbf"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#A97BFF" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="420"/><line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/><line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/><line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/><line x1="640" y1="0" x2="640" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
  </g>
  <!-- Kotlin logo shape - abstract diamond/arrow -->
  <polygon points="260,60 500,60 260,210" fill="#A97BFF" opacity="0.25"/>
  <polygon points="260,210 380,130 500,210 380,270" fill="#7c5cbf" opacity="0.2"/>
  <polygon points="260,210 260,360 380,270" fill="#A97BFF" opacity="0.15"/>
  <!-- Outline version -->
  <polygon points="260,60 500,60 260,210" fill="none" stroke="#A97BFF" stroke-width="1.5" opacity="0.6"/>
  <polygon points="260,210 380,130 500,210 380,270" fill="none" stroke="#9060df" stroke-width="1.2" opacity="0.5"/>
  <polygon points="260,210 260,360 380,270" fill="none" stroke="#A97BFF" stroke-width="1.2" opacity="0.45"/>
  <!-- Phone shape abstraction -->
  <rect x="560" y="80" width="100" height="180" rx="16" fill="none" stroke="#A97BFF" stroke-width="1.5" opacity="0.35"/>
  <rect x="575" y="96" width="70" height="110" rx="4" fill="#A97BFF" opacity="0.06"/>
  <circle cx="610" cy="236" r="8" fill="none" stroke="#A97BFF" stroke-width="1" opacity="0.35"/>
  <!-- Small dots / particles -->
  <circle cx="140" cy="300" r="5" fill="#A97BFF" opacity="0.5"/>
  <circle cx="180" cy="260" r="3" fill="#c8a0ff" opacity="0.4"/>
  <circle cx="700" cy="80" r="4" fill="#A97BFF" opacity="0.4"/>
  <circle cx="720" cy="340" r="6" fill="none" stroke="#A97BFF" stroke-width="1" opacity="0.3"/>
  <!-- Connecting lines -->
  <line x1="500" y1="60" x2="560" y2="120" stroke="#A97BFF" stroke-width="0.8" opacity="0.3"/>
  <line x1="380" y1="270" x2="560" y2="220" stroke="#A97BFF" stroke-width="0.8" opacity="0.2"/>
  <!-- Label -->
  <text x="400" y="400" font-family="monospace" font-size="10" fill="#A97BFF" opacity="0.5" text-anchor="middle">kotlin · android sdk · mobile ui · android studio</text>
  <text x="160" y="420" font-family="monospace" font-size="50" fill="#A97BFF" opacity="0.05" text-anchor="middle" font-weight="bold">KT</text>
</svg>
