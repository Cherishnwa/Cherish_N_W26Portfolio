<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d00"/>
      <stop offset="100%" style="stop-color:#1e1100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#b07219" stroke-width="0.3" opacity="0.12">
    <line x1="0" y1="84" x2="800" y2="84"/><line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="252" x2="800" y2="252"/><line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- Microservice nodes - circles connected by lines -->
  <!-- Central node -->
  <circle cx="400" cy="210" r="40" fill="#b07219" opacity="0.2"/>
  <circle cx="400" cy="210" r="40" fill="none" stroke="#b07219" stroke-width="2" opacity="0.7"/>
  <!-- Satellite nodes -->
  <circle cx="200" cy="130" r="28" fill="#b07219" opacity="0.15"/>
  <circle cx="200" cy="130" r="28" fill="none" stroke="#b07219" stroke-width="1.5" opacity="0.55"/>
  <circle cx="600" cy="130" r="28" fill="#b07219" opacity="0.15"/>
  <circle cx="600" cy="130" r="28" fill="none" stroke="#b07219" stroke-width="1.5" opacity="0.55"/>
  <circle cx="180" cy="300" r="22" fill="none" stroke="#e07a20" stroke-width="1.2" opacity="0.45"/>
  <circle cx="620" cy="300" r="22" fill="none" stroke="#e07a20" stroke-width="1.2" opacity="0.45"/>
  <circle cx="400" cy="60" r="18" fill="none" stroke="#f0a030" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="370" r="18" fill="none" stroke="#f0a030" stroke-width="1" opacity="0.4"/>
  <!-- Connection lines -->
  <line x1="400" y1="170" x2="200" y2="155" stroke="#b07219" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="170" x2="600" y2="155" stroke="#b07219" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="180" y2="280" stroke="#b07219" stroke-width="1.2" opacity="0.3"/>
  <line x1="400" y1="250" x2="620" y2="280" stroke="#b07219" stroke-width="1.2" opacity="0.3"/>
  <line x1="400" y1="170" x2="400" y2="78" stroke="#b07219" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="250" x2="400" y2="352" stroke="#b07219" stroke-width="1" opacity="0.3"/>
  <!-- Cross connector -->
  <line x1="200" y1="155" x2="180" y2="278" stroke="#e07a20" stroke-width="0.8" opacity="0.2"/>
  <line x1="600" y1="155" x2="620" y2="278" stroke="#e07a20" stroke-width="0.8" opacity="0.2"/>
  <!-- Dot accents -->
  <circle cx="400" cy="210" r="8" fill="#b07219" opacity="0.9"/>
  <circle cx="200" cy="130" r="6" fill="#b07219" opacity="0.8"/>
  <circle cx="600" cy="130" r="6" fill="#b07219" opacity="0.8"/>
  <circle cx="180" cy="300" r="5" fill="#e07a20" opacity="0.7"/>
  <circle cx="620" cy="300" r="5" fill="#e07a20" opacity="0.7"/>
  <!-- Label -->
  <text x="400" y="405" font-family="monospace" font-size="10" fill="#b07219" opacity="0.5" text-anchor="middle">java · spring boot · microservices · distributed systems</text>
  <text x="650" y="400" font-family="monospace" font-size="42" fill="#b07219" opacity="0.05" text-anchor="middle" font-weight="bold">JAVA</text>
</svg>
