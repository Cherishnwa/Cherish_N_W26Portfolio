<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#1f1a00"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0db4f"/>
      <stop offset="100%" style="stop-color:#e8c32a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#f0db4f" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="80" y1="0" x2="80" y2="420"/>
    <line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/>
    <line x1="640" y1="0" x2="640" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
  </g>
  <!-- Large tilted rect -->
  <rect x="280" y="60" width="240" height="240" rx="4" fill="#f0db4f" opacity="0.08" transform="rotate(15, 400, 180)"/>
  <!-- JS logo squares - abstract -->
  <rect x="300" y="80" width="200" height="200" rx="6" fill="none" stroke="#f0db4f" stroke-width="2" opacity="0.5"/>
  <rect x="330" y="110" width="140" height="140" rx="4" fill="#f0db4f" opacity="0.12"/>
  <!-- Floating geometric elements -->
  <rect x="580" y="60" width="80" height="80" rx="3" fill="none" stroke="#f0db4f" stroke-width="1.2" opacity="0.35" transform="rotate(20, 620, 100)"/>
  <rect x="100" y="270" width="60" height="60" rx="3" fill="#f0db4f" opacity="0.12" transform="rotate(-10, 130, 300)"/>
  <rect x="660" y="280" width="50" height="50" rx="3" fill="none" stroke="#f0db4f" stroke-width="1" opacity="0.3" transform="rotate(35, 685, 305)"/>
  <!-- Accent circles -->
  <circle cx="140" cy="110" r="30" fill="none" stroke="#f0db4f" stroke-width="1" opacity="0.25"/>
  <circle cx="140" cy="110" r="5" fill="#f0db4f" opacity="0.5"/>
  <circle cx="700" cy="160" r="20" fill="none" stroke="#f0db4f" stroke-width="1" opacity="0.2"/>
  <!-- Connecting lines -->
  <line x1="300" y1="80" x2="140" y2="110" stroke="#f0db4f" stroke-width="0.7" opacity="0.2"/>
  <line x1="500" y1="280" x2="700" y2="160" stroke="#f0db4f" stroke-width="0.7" opacity="0.2"/>
  <!-- Label -->
  <text x="400" y="330" font-family="monospace" font-size="11" fill="#f0db4f" opacity="0.5" text-anchor="middle">javascript · node.js · rest api · full stack</text>
  <text x="400" y="395" font-family="monospace" font-size="55" fill="#f0db4f" opacity="0.05" text-anchor="middle" font-weight="bold">JS</text>
</svg>
